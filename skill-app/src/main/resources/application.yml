server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: skill-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/skill_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MinIO
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: skill-platform

# Elasticsearch
spring.elasticsearch.uris: http://localhost:9200

# JWT
jwt:
  secret: your-256-bit-secret-key-here-change-in-production
  access-token-expiry: 7200
  refresh-token-expiry: 604800

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
