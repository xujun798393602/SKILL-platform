version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - skill-network
    restart: unless-stopped

  app:
    build: .
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://skill_user:skill_pass@db:5432/skill_platform
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=skill_user
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skill-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skill_platform
      POSTGRES_USER: skill_user
      POSTGRES_PASSWORD: skill_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skill_user -d skill_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skill-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skill-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  skill-network:
    driver: bridge
