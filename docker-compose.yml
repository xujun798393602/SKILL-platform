services:
  # ==================== Infrastructure ====================

  postgres:
    image: postgres:16-alpine
    container_name: skill-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-skill_platform}
      POSTGRES_USER:     ${POSTGRES_USER:-skill_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skill_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skill_user} -d ${POSTGRES_DB:-skill_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skill-network

  redis:
    image: redis:7-alpine
    container_name: skill-redis
    restart: unless-stopped
    ports:
      - "16739:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skill-network

  # ==================== Application ====================

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skill-backend
    restart: unless-stopped
    environment:
      SECRET_KEY:       ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY:   ${JWT_SECRET_KEY:-change-me-in-production}
      DATABASE_URL:     ${DATABASE_URL:-postgresql://skill_user:skill_pass@postgres:5432/skill_platform}
      REDIS_URL:        ${REDIS_URL:-redis://redis:6379/0}
      UPLOAD_FOLDER:    ${UPLOAD_FOLDER:-/tmp/skill-uploads}
      FLASK_APP:        wsgi.py
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      LOG_LEVEL:        ${LOG_LEVEL:-info}
    # ports:
    #   - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - skill-network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: skill-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - skill-network

# ==================== Volumes ====================
volumes:
  postgres_data:
    driver: local

# ==================== Networks ====================
networks:
  skill-network:
    driver: bridge
